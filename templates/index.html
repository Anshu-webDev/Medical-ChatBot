<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ company.name }} Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .chat-container {
      width: 100%;
      max-width: 480px;
      height: 90vh;
      max-height: 760px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* STICKY HEADER */
    .chat-header {
      background: #0077b6;
      color: #fff;
      padding: 16px 20px;
      flex-shrink: 0;
    }
    .chat-header h2 { font-size: 18px; }
    .chat-header p { font-size: 12px; opacity: 0.85; margin-top: 3px; }

    /* SCROLLABLE MESSAGES ONLY */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .bot {
      background: #e8f4fd;
      color: #333;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .user {
      background: #0077b6;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    /* STICKY INPUT BOX */
    .chat-input {
      display: flex;
      border-top: 1px solid #e0e0e0;
      padding: 12px;
      gap: 8px;
      flex-shrink: 0;
      background: #fff;
    }
    .chat-input input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 20px;
      outline: none;
      font-size: 14px;
    }
    .chat-input input:focus { border-color: #0077b6; }
    .chat-input button {
      background: #0077b6;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }
    .chat-input button:hover { background: #005f8e; }

    /* MOBILE */
    @media (max-width: 520px) {
      body { padding: 0; align-items: stretch; }
      .chat-container {
        max-width: 100%;
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h2>{{ company.name }}</h2>
      <p>{{ company.tagline }}</p>
    </div>
    <div class="chat-messages" id="messages">
      <div class="message bot">Hi! I'm the {{ company.name }} assistant. Ask me about appointments, doctors, timings, and more!</div>
    </div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Type your message..." onkeydown="if(event.key==='Enter') sendMessage()" />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    function sendMessage() {
      const input = document.getElementById("userInput");
      const messages = document.getElementById("messages");
      const text = input.value.trim();
      if (!text) return;

      messages.innerHTML += `<div class="message user">${text}</div>`;
      input.value = "";
      messages.scrollTop = messages.scrollHeight;

      fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      })
      .then(res => res.json())
      .then(data => {
        messages.innerHTML += `<div class="message bot">${data.response}</div>`;
        messages.scrollTop = messages.scrollHeight;
      });
    }
  </script>
</body>
</html>
